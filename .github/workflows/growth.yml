name: Growth Strategist

on:
  schedule:
    - cron: '0 9,18 * * *'  # Twice daily at 09 and 18 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  discussions: write
  actions: write

concurrency:
  group: growth
  cancel-in-progress: true

jobs:
  grow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Check onboarding complete
        run: |
          if [ ! -f state/evolve_config.md ]; then
            echo "::warning::Onboarding not complete. Run: claude 'Set up agentfolio. Follow https://github.com/verkyyi/agentfolio/blob/main/docs/onboarding.md'"
            exit 0
          fi

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Collect growth context
        run: |
          echo "=== GROWTH METRICS ===" > /tmp/growth_context.txt
          cat state/growth_metrics.md >> /tmp/growth_context.txt

          echo "" >> /tmp/growth_context.txt
          echo "=== ADOPTERS ===" >> /tmp/growth_context.txt
          cat state/adopters.md >> /tmp/growth_context.txt

          echo "" >> /tmp/growth_context.txt
          echo "=== RECENT RESEARCH (last 20) ===" >> /tmp/growth_context.txt
          tail -20 state/research_log.md >> /tmp/growth_context.txt

          echo "" >> /tmp/growth_context.txt
          echo "=== GROWTH LOG (last 20) ===" >> /tmp/growth_context.txt
          tail -20 state/growth_log.md 2>/dev/null >> /tmp/growth_context.txt || echo "(empty)" >> /tmp/growth_context.txt

          echo "" >> /tmp/growth_context.txt
          echo "=== RECENT AGENT LOG ===" >> /tmp/growth_context.txt
          tail -10 state/agent_log.md >> /tmp/growth_context.txt

          echo "" >> /tmp/growth_context.txt
          echo "=== REPO STATS ===" >> /tmp/growth_context.txt
          gh api repos/${{ github.repository }} --jq '{stars: .stargazers_count, forks: .forks_count, watchers: .subscribers_count, open_issues: .open_issues_count}' >> /tmp/growth_context.txt

          echo "" >> /tmp/growth_context.txt
          echo "=== EXISTING RELEASES ===" >> /tmp/growth_context.txt
          gh release list --limit 5 >> /tmp/growth_context.txt 2>/dev/null || echo "(none)" >> /tmp/growth_context.txt

          echo "" >> /tmp/growth_context.txt
          echo "=== EXISTING DISCUSSIONS ===" >> /tmp/growth_context.txt
          gh api repos/${{ github.repository }}/discussions --jq '.[].title' >> /tmp/growth_context.txt 2>/dev/null || echo "(none or disabled)" >> /tmp/growth_context.txt
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build growth prompt
        run: |
          GROWTH_CONTEXT=$(cat /tmp/growth_context.txt)
          LEARNED_RULES=$(cat state/learned_rules.md)
          RECENT_COMMITS=$(git log --oneline -20)

          cat > /tmp/growth_prompt.txt << 'PROMPTSTART'
          You are the growth strategist for Agentfolio — a self-evolving scaffold
          for autonomous web projects. Your job is to increase adoption: more
          stars, forks, template users, and community engagement.

          You run twice daily. You discover opportunities, execute what you can,
          and measure what worked.

          ## YOUR PROCESS:

          ### Step 1: Assess current state
          Read the growth context below. Compare to previous growth_log.md entries.
          - Are stars/forks trending up or flat?
          - Any new referrers or adopters?
          - Did previous growth actions have impact?

          ### Step 2: Discover opportunities
          Search for distribution channels using the GitHub API:

          ```bash
          # Find awesome lists that could include us
          AWESOME_LISTS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/search/repositories?q=awesome+claude+code+in:name&sort=stars&per_page=5" \
            | head -c 1500)

          AWESOME_AGENTS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/search/repositories?q=awesome+ai+agents+in:name&sort=stars&per_page=5" \
            | head -c 1500)

          AWESOME_ACTIONS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/search/repositories?q=awesome+github+actions+in:name&sort=stars&per_page=5" \
            | head -c 1500)

          # Find discussions where people ask about autonomous workflows
          DISCUSSIONS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/search/issues?q=autonomous+agent+workflow+github+actions+type:issue+is:open&sort=created&per_page=5" \
            | head -c 1500)
          ```

          ### Step 3: Execute actions (pick the best 1-2 per run)

          ACTIONS YOU CAN TAKE (ranked by impact):

          **A. Create a GitHub Release** (if notable features merged since last release)
          - Check git log since last release tag
          - If there are meaningful changes, create a release:
            gh release create vX.Y.Z --title "Title" --notes "changelog" --latest
          - Use semantic versioning. Check existing releases first.
          - A good release has a catchy title and clear changelog.
          - ONLY create a release if there are real changes worth announcing.

          **B. Create a GitHub Discussion** (educational, max 1 per week)
          - Check if discussions are enabled. If not, skip.
          - Topics that attract developers:
            - "How our self-healing pipeline caught and fixed X"
            - "What we learned from analyzing X repos"
            - "Architecture decision: why we chose blacklist over whitelist"
          - Use: gh api repos/${{ github.repository }}/discussions -X POST ...
          - Check existing discussions to avoid duplicates.
          - Make it genuinely useful, not promotional.

          **C. Improve the README** for discoverability
          - Add badges, improve the hook, sharpen the value prop
          - Only if you have a specific improvement, not for churn

          **D. Create an issue for external actions** (things you can't do directly)
          - "Submit to awesome-claude-code list" with exact PR instructions
          - "Submit to awesome-github-actions list" with exact PR instructions
          - Label: use the project label from the Evolve Config (e.g., `growth-action,needs-review,project:<reponame>`)
          - Include: which repo, what to add, where in the list
          - Check if we already have an open issue for this

          ### Step 4: Log everything

          Append to state/growth_log.md:
          TIMESTAMP | action_type | description | expected_impact

          Append to state/agent_log.md:
          TIMESTAMP | growth.yml | growth strategy run | summary

          Update state/project_state.md with growth status.

          ### Step 5: Measure previous actions

          Read state/growth_log.md for past actions. For each action older
          than 24 hours, check if it had impact:
          - Release created → did stars increase?
          - Discussion created → any replies or reactions?
          - README improved → did traffic increase?

          Append measurement to growth_log.md:
          TIMESTAMP | measurement | [action from DATE] → [result]

          ## RULES:
          - Maximum 2 actions per run
          - Never spam. Every action must provide genuine value.
          - Never create duplicate releases, discussions, or issues
          - Check what already exists before creating anything
          - Releases need real changes — don't create empty releases
          - Discussions need real insight — don't write fluff
          - If nothing good to do, log "no action — waiting for signal" and exit
          - Quality over quantity. One great release > five mediocre ones.

          PROMPTSTART

          cat >> /tmp/growth_prompt.txt << PROMPTEND

          ## Evolve Config
          $(cat state/evolve_config.md)

          Use the project name from the config for labels (not "project:scaffold").
          When a workflow is marked SKIP in the config, ignore its failures in health checks.
          Read CLAUDE.md from the path in the Project section of the config.

          ## Growth context:
          ${GROWTH_CONTEXT}

          ## Recent commits:
          ${RECENT_COMMITS}

          ## Learned rules:
          ${LEARNED_RULES}
          PROMPTEND

      - name: Run growth strategist
        run: |
          claude -p "$(cat /tmp/growth_prompt.txt)" \
            --model opus \
            --effort max \
            --max-turns 25 \
            --permission-mode bypassPermissions \
            --output-format json \
            > /tmp/claude_output.json
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Log usage metrics
        if: always()
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          if [ -f /tmp/claude_output.json ]; then
            MODEL=$(jq -r '(.modelUsage // {} | keys | .[0]) // "unknown"' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            INPUT=$(jq -r '((.usage.input_tokens // 0) + (.usage.cache_creation_input_tokens // 0) + (.usage.cache_read_input_tokens // 0)) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            OUTPUT=$(jq -r '(.usage.output_tokens // 0) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            TURNS=$(jq -r '(.num_turns // 0) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            COST=$(jq -r '(.total_cost_usd // 0) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
          else
            MODEL="unknown"; INPUT="unknown"; OUTPUT="unknown"; TURNS="unknown"; COST="unknown"
          fi
          mkdir -p state
          if [ ! -f state/usage_log.md ]; then
            printf '# Usage Log\n' > state/usage_log.md
          fi
          echo "${TIMESTAMP} | growth | model:${MODEL} | in:${INPUT} | out:${OUTPUT} | turns:${TURNS} | cost:${COST}" >> state/usage_log.md
          CUTOFF=$(date -u -d '7 days ago' +%Y-%m-%dT)
          awk -v c="$CUTOFF" 'NR==1{print;next} $0>=c' state/usage_log.md > /tmp/usage_trimmed.md && mv /tmp/usage_trimmed.md state/usage_log.md

      - name: Commit state updates
        run: |
          git config user.name "agentfolio[bot]"
          git config user.email "agentfolio[bot]@users.noreply.github.com"
          git add state/
          if ! git diff --cached --quiet; then
            git commit -m "state: growth strategy run — $(date -u +%Y-%m-%dT%H:%M)"
            git pull --rebase || true
            git push || true
          fi

      - name: Trigger triage for new issues
        run: |
          if [ -f .new_issues.txt ]; then
            while read -r NUM; do
              echo "Triggering triage for issue #$NUM"
              gh workflow run triage.yml -f issue_number="$NUM"
            done < .new_issues.txt
            rm -f .new_issues.txt
          fi
        env:
          GH_TOKEN: ${{ github.token }}
