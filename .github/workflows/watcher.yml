name: Pipeline Watcher

on:
  schedule:
    - cron: '30 * * * *'  # Every hour at :30 (offset from evolve at :00)
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write

concurrency:
  group: watcher
  cancel-in-progress: true

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check onboarding complete
        run: |
          if [ ! -f state/evolve_config.md ]; then
            echo "::warning::Onboarding not complete. Run: claude 'Set up agentfolio. Follow https://github.com/verkyyi/agentfolio/blob/main/docs/onboarding.md'"
            exit 0
          fi

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Check for recent human activity
        id: human
        run: |
          RECENT_HUMAN=$(git log origin/main --since="2 hours ago" --format="%an" \
            | grep -v "agentfolio\[bot\]" | head -1)
          if [ -n "$RECENT_HUMAN" ]; then
            echo "HUMAN_ACTIVE=true" >> $GITHUB_OUTPUT
            echo "Human recently active — watcher will observe but skip corrective actions"
          else
            echo "HUMAN_ACTIVE=false" >> $GITHUB_OUTPUT
          fi

      - name: Collect system state
        id: state
        run: |
          echo "=== FAILED RUNS (last 6 hours) ===" > /tmp/system_state.txt
          gh run list --status failure --limit 20 \
            --json databaseId,workflowName,createdAt,conclusion,headBranch \
            -q '.[] | "\(.databaseId) | \(.workflowName) | \(.createdAt) | \(.headBranch)"' \
            >> /tmp/system_state.txt

          echo "" >> /tmp/system_state.txt
          echo "=== IN-PROGRESS RUNS ===" >> /tmp/system_state.txt
          gh run list --status in_progress --limit 10 \
            --json databaseId,workflowName,createdAt \
            -q '.[] | "\(.databaseId) | \(.workflowName) | \(.createdAt)"' \
            >> /tmp/system_state.txt

          echo "" >> /tmp/system_state.txt
          echo "=== OPEN ISSUES ===" >> /tmp/system_state.txt
          gh issue list --state open --limit 20 \
            --json number,title,labels,createdAt,updatedAt \
            -q '.[] | "#\(.number) | \(.title) | \([.labels[].name] | join(",")) | created: \(.createdAt) | updated: \(.updatedAt)"' \
            >> /tmp/system_state.txt

          echo "" >> /tmp/system_state.txt
          echo "=== RECENTLY CLOSED ISSUES (last 24h) ===" >> /tmp/system_state.txt
          gh issue list --state closed --limit 10 \
            --json number,title,labels,closedAt \
            -q '.[] | "#\(.number) | \(.title) | \([.labels[].name] | join(",")) | closed: \(.closedAt)"' \
            >> /tmp/system_state.txt

          echo "" >> /tmp/system_state.txt
          echo "=== OPEN PRS ===" >> /tmp/system_state.txt
          gh pr list --state open --limit 10 \
            --json number,title,labels,createdAt,updatedAt \
            -q '.[] | "#\(.number) | \(.title) | \([.labels[].name] | join(",")) | created: \(.createdAt) | updated: \(.updatedAt)"' \
            >> /tmp/system_state.txt

          echo "" >> /tmp/system_state.txt
          echo "=== RECENT SUCCESSFUL RUNS (last 10) ===" >> /tmp/system_state.txt
          gh run list --status success --limit 10 \
            --json databaseId,workflowName,createdAt \
            -q '.[] | "\(.databaseId) | \(.workflowName) | \(.createdAt)"' \
            >> /tmp/system_state.txt
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build watcher prompt
        run: |
          SYSTEM_STATE=$(cat /tmp/system_state.txt)
          LEARNED_RULES=$(cat state/learned_rules.md)
          AGENT_LOG=$(tail -30 state/agent_log.md)

          cat > /tmp/watcher_prompt.txt << 'PROMPTSTART'
          You are the pipeline watcher — the self-healing guardian of Agentfolio.
          You monitor the entire automated pipeline and take corrective action
          when things go wrong. You run every 30 minutes.

          PROMPTSTART

          # Inject human-active flag (outside single-quoted heredoc so variable expands)
          cat >> /tmp/watcher_prompt.txt << HUMANFLAG
          ## Human Activity Status: HUMAN_ACTIVE=${{ steps.human.outputs.HUMAN_ACTIVE }}
          When HUMAN_ACTIVE=true, a human is working in a CLI session. In this mode:
          - Still collect and log system health (observability is always useful)
          - Do NOT take corrective actions (no re-triggering workflows, no label changes)
          - Do NOT modify issues or PRs (human is actively managing them)
          - Skip issues labeled "human-wip" entirely
          - Log findings as usual so the next normal run can act on them
          When HUMAN_ACTIVE=false, operate normally with all responsibilities.

          HUMANFLAG

          cat >> /tmp/watcher_prompt.txt << 'PROMPTSTART'
          ## Your responsibilities:

          ### 1. Detect broken chains
          The pipeline is: evolve → issue → triage → coder → PR → reviewer → merge
          Check if any link is broken:
          - Issues labeled "agent-ready" but no coder run started → re-trigger coder
          - PRs open with no reviewer run → re-trigger reviewer
          - Triage completed but coder never triggered → re-trigger coder
          - Coder completed but reviewer never triggered → re-trigger reviewer

          ### 2. Detect repeated failures
          If the same workflow has failed 3+ times in a row with no success:
          - Get the failure logs: gh run view <id> --log-failed 2>&1 | tail -20
          - Create a [pipeline] issue if one doesn't exist for this failure pattern
          - Include the error message and suggested fix in the issue body

          ### 3. Detect stuck runs
          - Runs in_progress for >30 minutes may be stuck
          - Note them in the log but don't cancel (they may be legitimately long)

          ### 4. Detect stale issues/PRs
          - Issues labeled "agent-ready" for >2 hours with no activity → re-trigger coder
          - PRs open for >1 hour with no review → re-trigger reviewer
          - Issues open for >24 hours with no labels → re-trigger triage

          ### 5. Cleanup
          - Close issues that were fixed (PR merged that references the issue)
          - Remove "agent-ready" label from issues that already have a PR open

          ### 6. Unblock issues after infrastructure fixes
          When a "needs-human" or "pipeline-fix" issue is recently closed (see RECENTLY CLOSED ISSUES),
          check if any open issues with "needs-human" label are now unblocked by that fix.

          How to evaluate:
          - Read the closed issue to understand what infrastructure problem was resolved
          - Read each open "needs-human" issue to understand what blocker it hit
          - If the closed fix resolves the blocker (e.g. a missing PAT was added, a permission
            was granted, a service was configured), the blocked issue is now unblockable
          - For unblocked issues:
            1. Remove "needs-human" label
            2. Add "agent-ready" label
            3. Comment: "**Watcher:** Blocker resolved (see #N). Re-queuing for the coder agent."
            4. This counts toward the 5 corrective actions per run limit

          ### 7. Verify pipeline stage outcomes
          Don't just check if workflows ran — verify they produced expected results.
          Process signals (did it run? did it exit 0?) are necessary but not sufficient.
          Check outcome signals too.

          **For each open issue:**

          - If open >2 hours and has no comment containing "Triaged by agentfolio triage agent":
            the issue was never triaged. Re-trigger triage regardless of existing labels.
            This catches pre-labeled issues created by evolve.yml that triage never processed.
            Command: gh issue view N --json comments -q '.comments[].body' | grep -q "Triaged by agentfolio"
            If grep finds nothing → re-trigger triage.

          - If the issue has a coder agent comment (containing "Coder agent:") indicating a
            failure attempt, but currently has NO actionable label (agent-ready, needs-human,
            needs-review) AND no open PR linked to it:
            the issue fell through the cracks after a coder push failure. Re-trigger triage
            to re-classify it.

          **For each open PR:**

          - If open >1 hour and has zero reviews: check if a reviewer workflow run completed
            for this PR. If yes, the reviewer silently failed (hit max-turns without writing
            a review). Re-trigger the reviewer.
            Command: gh pr view N --json reviews -q '.reviews | length'
            If result is 0 → reviewer failed silently → re-trigger reviewer.

          - If re-triggering reviewer for a PR that has ALREADY been re-triggered before with
            no review produced (check comments for prior "Watcher: re-triggering reviewer"
            messages): instead of re-triggering again, add label "needs-human" and comment:
            "**Watcher:** Automated review has been triggered multiple times without producing
            a review (likely hitting max-turns limit). Manual review required."

          ## How to take corrective action:
          - Re-trigger triage: gh workflow run triage.yml -f issue_number=N
          - Re-trigger coder: gh workflow run coder.yml -f issue_number=N
          - Re-trigger reviewer: gh workflow run reviewer.yml -f pr_number=N
          - Create issue: use the project label from the Evolve Config (e.g., `project:<reponame>`) — not `project:scaffold`
            e.g.: gh issue create --title "[pipeline] ..." --body "..." --label "pipeline-fix,project:<reponame>"
          - Close issue: gh issue close N
          - Always check for duplicates before creating issues

          ### 8. Analyze token utilization
          Skip this responsibility if state/usage_log.md has fewer than 20 data lines
          (lines not starting with #). Read state/usage_log.md and evaluate:

          **Underutilization signals:**
          - Workflows consistently using <30% of max-turns (e.g. coder completes in 5 of 40 turns)
          - Low output tokens relative to task complexity
          - No rate-limit errors in state/agent_log.md

          **Overutilization signals:**
          - Workflows frequently hitting max-turns (>30% of runs for that workflow)
          - Rate-limit errors appearing in state/agent_log.md
          - Fallback model triggering (model in usage_log differs from configured primary)

          **Usage targets:** 70-90% of rate limit = healthy; <50% = underutilized;
          >95% = saturated; >30% of runs hitting max-turns = limit too low.

          When a clear optimization is found:
          1. Check for an existing open issue before creating one:
             gh issue list --state open --label pipeline-fix --json title -q '.[].title'
          2. Create at most 1 optimization issue per run:
             gh issue create --title "[pipeline] Optimize [workflow] CLI config — [signal]" \
               --body "## Signal\n[describe the pattern]\n\n## Evidence\n[data from usage_log.md]\n\n## Proposed Change\n[specific flag to change and expected outcome]\n\n---\n*Created by watcher.yml token utilization analysis*" \
               --label "pipeline-fix,project:<reponame from Evolve Config>"
          3. This counts toward the 5 corrective actions per run limit

          ## Rules:
          - Maximum 5 corrective actions per run (don't flood the system)
          - Never re-trigger a workflow that is currently in_progress
          - Never re-trigger a workflow that succeeded in the last 30 minutes
          - Always log what you did to state/agent_log.md:
            TIMESTAMP | watcher.yml | health check | [summary of findings and actions]
          - Update state/project_state.md with current system health
          - If everything is healthy, just log "all clear" and exit

          PROMPTSTART

          # Now append the dynamic data outside the quoted heredoc
          cat >> /tmp/watcher_prompt.txt << PROMPTEND

          ## Current system state:
          ${SYSTEM_STATE}

          ## Recent agent log:
          ${AGENT_LOG}

          ## Learned rules:
          ${LEARNED_RULES}

          ## Evolve Config
          $(cat state/evolve_config.md)

          Use the project name from the config for labels (not "project:scaffold").
          When checking pipeline health, ignore failures from workflows marked SKIP in the config — these are expected to not run.
          Read CLAUDE.md from the path in the Project section of the config.

          ## Context:
          $(cat CLAUDE.md)
          $(cat $(grep '^CLAUDE.md:' state/evolve_config.md | cut -d' ' -f2))
          PROMPTEND

      - name: Run watcher
        run: |
          claude -p "$(cat /tmp/watcher_prompt.txt)" \
            --model opus \
            --effort max \
            --max-turns 25 \
            --permission-mode bypassPermissions \
            --output-format json \
            > /tmp/claude_output.json
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Log usage metrics
        if: always()
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          if [ -f /tmp/claude_output.json ]; then
            MODEL=$(jq -r '(.modelUsage // {} | keys | .[0]) // "unknown"' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            INPUT=$(jq -r '((.usage.input_tokens // 0) + (.usage.cache_creation_input_tokens // 0) + (.usage.cache_read_input_tokens // 0)) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            OUTPUT=$(jq -r '(.usage.output_tokens // 0) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            TURNS=$(jq -r '(.num_turns // 0) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            COST=$(jq -r '(.total_cost_usd // 0) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
          else
            MODEL="unknown"; INPUT="unknown"; OUTPUT="unknown"; TURNS="unknown"; COST="unknown"
          fi
          mkdir -p state
          if [ ! -f state/usage_log.md ]; then
            printf '# Usage Log\n' > state/usage_log.md
          fi
          echo "${TIMESTAMP} | watcher | model:${MODEL} | in:${INPUT} | out:${OUTPUT} | turns:${TURNS} | cost:${COST}" >> state/usage_log.md
          CUTOFF=$(date -u -d '7 days ago' +%Y-%m-%dT)
          awk -v c="$CUTOFF" 'NR==1{print;next} $0>=c' state/usage_log.md > /tmp/usage_trimmed.md && mv /tmp/usage_trimmed.md state/usage_log.md

      - name: Commit state updates
        run: |
          git config user.name "agentfolio[bot]"
          git config user.email "agentfolio[bot]@users.noreply.github.com"
          git add state/
          if ! git diff --cached --quiet; then
            git commit -m "state: watcher health check — $(date -u +%Y-%m-%dT%H:%M)"
            git pull --rebase || true
            git push || true
          fi
