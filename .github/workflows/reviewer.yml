name: Reviewer Agent

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  review:
    # For PR events, only review bot PRs. For dispatch, always run.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.user.login == 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR
        id: pr
        run: |
          if [ -n "${{ inputs.pr_number }}" ]; then
            NUM="${{ inputs.pr_number }}"
          else
            NUM="${{ github.event.pull_request.number }}"
          fi
          echo "NUMBER=$NUM" >> $GITHUB_OUTPUT

          gh pr view "$NUM" --json headRefOid,headRefName,title --repo ${{ github.repository }} > /tmp/pr.json
          SHA=$(jq -r '.headRefOid' /tmp/pr.json)
          BRANCH=$(jq -r '.headRefName' /tmp/pr.json)
          TITLE=$(jq -r '.title' /tmp/pr.json)
          echo "SHA=$SHA" >> $GITHUB_OUTPUT
          echo "BRANCH=$BRANCH" >> $GITHUB_OUTPUT
          echo "TITLE=$TITLE" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.SHA }}
          fetch-depth: 0

      - name: Check onboarding complete
        run: |
          if [ ! -f state/evolve_config.md ]; then
            echo "::warning::Onboarding not complete. Run: claude 'Set up agentfolio. Follow https://github.com/verkyyi/agentfolio/blob/main/docs/onboarding.md'"
            exit 0
          fi

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin main
          DIFF=$(git diff origin/main...HEAD --name-only)
          echo "CHANGED_FILES<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install project dependencies
        run: |
          INSTALL_CMD=$(grep '^install:' state/evolve_config.md | cut -d: -f2- | xargs)
          if [ -n "$INSTALL_CMD" ]; then
            eval "$INSTALL_CMD"
          fi

      - name: Build review prompt
        run: |
          NUM=${{ steps.pr.outputs.NUMBER }}
          TITLE="${{ steps.pr.outputs.TITLE }}"
          BRANCH="${{ steps.pr.outputs.BRANCH }}"
          CHANGED="${{ steps.diff.outputs.CHANGED_FILES }}"

          LEARNED_RULES=$(cat state/learned_rules.md)

          cat > /tmp/review_prompt.txt << PROMPT
          You are the reviewer agent for Agentfolio. Your job is to review PRs
          and decide: merge or block. You should be BOLD — approve and merge
          most changes. The system is designed to self-heal, so a bad merge
          gets caught and fixed by the next evolve cycle.

          PR #${NUM}
          Title: ${TITLE}
          Branch: ${BRANCH}

          Changed files:
          ${CHANGED}

          ## Evolve Config
          $(cat state/evolve_config.md)

          Use the Build section for install/build/test commands. Do NOT assume npm.
          Read CLAUDE.md from the path in the Project section of the config.

          ## Review process:

          1. Read the actual changed files (use Read tool on each file)
          2. Run the test command from the Evolve Config Build section — if it passes, that's a strong signal
          3. Check the diff: git diff origin/main...HEAD
          4. Apply the decision framework below

          ## Decision framework (BLACKLIST — block only these, approve everything else):

          HARD BLOCK (only these warrant blocking):
          - Secrets, tokens, API keys, or credentials visible in code
          - Deleting CLAUDE.md, package.json, or workflow files without replacement
          - Build fails
          - Infinite loop risk (e.g., workflow triggering itself endlessly)

          APPROVE AND MERGE — everything else, including:
          - Source code, content, styling, config
          - Workflow YAML changes (self-modification is allowed and expected)
          - New or modified skill files
          - CLAUDE.md changes (the system evolves its own rules)
          - New files, new pages, layout changes
          - Package.json / dependency changes (if build passes)

          ## Your actions:

          If APPROVE (build passes, no hard blocks):
            gh pr review ${NUM} --approve --body "**Reviewer agent:** ✅ Reviewed and approved. Build passes, no hard blocks found." --repo ${{ github.repository }}
            gh pr merge ${NUM} --squash --repo ${{ github.repository }}

          If HARD BLOCK:
            gh pr review ${NUM} --request-changes --body "**Reviewer agent:** ❌ Blocked: [specific reason]. This requires human review." --repo ${{ github.repository }}
            gh pr edit ${NUM} --add-label "needs-review" --repo ${{ github.repository }}

          When in doubt, APPROVE. The system self-heals.

          ## Learned Rules (from human feedback — MUST follow these)
          ${LEARNED_RULES}
          PROMPT

      - name: Run reviewer
        run: |
          claude -p "$(cat /tmp/review_prompt.txt)" \
            --model opus \
            --effort max \
            --max-turns 30 \
            --fallback-model sonnet \
            --permission-mode bypassPermissions \
            --output-format json \
            > /tmp/claude_output.json
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Close linked issues if PR was merged
        if: always()
        run: |
          NUM=${{ steps.pr.outputs.NUMBER }}
          STATE=$(gh pr view "$NUM" --json state --jq '.state' --repo ${{ github.repository }})
          if [ "$STATE" = "MERGED" ]; then
            ISSUES=$(gh pr view "$NUM" --json closingIssuesReferences --jq '.closingIssuesReferences[].number' --repo ${{ github.repository }})
            for ISSUE in $ISSUES; do
              echo "Closing issue #$ISSUE (linked to merged PR #$NUM)"
              gh issue close "$ISSUE" --comment "Closed by merge of PR #$NUM." --repo ${{ github.repository }} || true
            done
          else
            echo "PR #$NUM not merged — skipping issue close"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Log usage metrics
        if: always()
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          if [ -f /tmp/claude_output.json ]; then
            MODEL=$(jq -r '(.modelUsage // {} | keys | .[0]) // "unknown"' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            INPUT=$(jq -r '((.usage.input_tokens // 0) + (.usage.cache_creation_input_tokens // 0) + (.usage.cache_read_input_tokens // 0)) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            OUTPUT=$(jq -r '(.usage.output_tokens // 0) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            TURNS=$(jq -r '(.num_turns // 0) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            COST=$(jq -r '(.total_cost_usd // 0) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
          else
            MODEL="unknown"; INPUT="unknown"; OUTPUT="unknown"; TURNS="unknown"; COST="unknown"
          fi
          mkdir -p state
          if [ ! -f state/usage_log.md ]; then
            printf '# Usage Log\n' > state/usage_log.md
          fi
          echo "${TIMESTAMP} | reviewer | model:${MODEL} | in:${INPUT} | out:${OUTPUT} | turns:${TURNS} | cost:${COST}" >> state/usage_log.md
          CUTOFF=$(date -u -d '7 days ago' +%Y-%m-%dT)
          awk -v c="$CUTOFF" 'NR==1{print;next} $0>=c' state/usage_log.md > /tmp/usage_trimmed.md && mv /tmp/usage_trimmed.md state/usage_log.md

      - name: Commit usage log
        if: always()
        run: |
          git config user.name "agentfolio[bot]"
          git config user.email "agentfolio[bot]@users.noreply.github.com"
          git add state/usage_log.md
          if ! git diff --cached --quiet; then
            git commit -m "state: reviewer usage metrics"
            git pull --rebase || true
            git push || true
          fi

      - name: Sync README after merge
        if: always()
        run: |
          NUM=${{ steps.pr.outputs.NUMBER }}
          STATE=$(gh pr view "$NUM" --json state --jq '.state' --repo ${{ github.repository }} 2>/dev/null || echo "UNKNOWN")
          if [ "$STATE" != "MERGED" ]; then
            echo "PR not merged — skipping README sync"
            exit 0
          fi

          # Only sync if structural files changed
          CHANGED=$(gh pr view "$NUM" --json files --jq '.files[].path' --repo ${{ github.repository }})
          if ! echo "$CHANGED" | grep -qE '^\.github/workflows/|^skills/|^apps/'; then
            echo "No structural files changed — skipping README sync"
            exit 0
          fi

          echo "Structural files changed in merged PR — syncing README"
          git config user.name "agentfolio[bot]"
          git config user.email "agentfolio[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main

          # Count actual workflow files
          ACTUAL_COUNT=$(ls -1 .github/workflows/*.yml 2>/dev/null | wc -l)

          # Number-to-word mapping
          declare -A WORDS
          WORDS=([1]="one" [2]="two" [3]="three" [4]="four" [5]="five" [6]="six" [7]="seven" [8]="eight" [9]="nine" [10]="ten" [11]="eleven" [12]="twelve" [13]="thirteen" [14]="fourteen" [15]="fifteen")
          COUNT_WORD="${WORDS[$ACTUAL_COUNT]:-$ACTUAL_COUNT}"

          # Update heading: "## The X workflows"
          sed -i "s/## The [a-z]* workflows/## The ${COUNT_WORD} workflows/" README.md

          # Update architecture comment: "The X autonomous workflows"
          sed -i "s/The [a-z]* autonomous workflows/The ${COUNT_WORD} autonomous workflows/" README.md

          # Add missing workflows to table
          LAST_TABLE_LINE=$(grep -n '^| `.*\.yml`' README.md | tail -1 | cut -d: -f1)
          for YML in .github/workflows/*.yml; do
            BASENAME=$(basename "$YML")
            if ! grep -q "^| \`${BASENAME}\`" README.md; then
              WF_NAME=$(grep '^name:' "$YML" | head -1 | sed 's/name: *//')
              TRIGGER="Dispatched"
              grep -q 'workflow_dispatch:' "$YML" && TRIGGER="Manual dispatch"
              grep -q 'schedule:' "$YML" && TRIGGER="Scheduled"
              grep -q 'push:' "$YML" && TRIGGER="Push to main"
              grep -q 'pull_request:' "$YML" && TRIGGER="PR event"
              grep -q 'issues:' "$YML" && TRIGGER="Issue event"
              sed -i "${LAST_TABLE_LINE}a\\| \`${BASENAME}\` | ${TRIGGER} | ${WF_NAME} |" README.md
              LAST_TABLE_LINE=$((LAST_TABLE_LINE + 1))
              echo "Added ${BASENAME} to README table"
            fi
          done

          # Remove table rows for deleted workflows
          grep -E '^\| `[^`]+\.yml`' README.md | sed -E 's/^\| `([^`]+\.yml)`.*/\1/' | while read -r WF; do
            if [ ! -f ".github/workflows/$WF" ]; then
              sed -i "/^| \`$(echo "$WF" | sed 's/\./\\./g')\`/d" README.md
              echo "Removed ${WF} from README table (file deleted)"
            fi
          done

          # Only commit if README actually changed
          if git diff --quiet README.md; then
            echo "README already up to date"
          else
            git add README.md
            git commit -m "state: sync README workflow count and table"
            git push origin main || true
          fi
        env:
          GH_TOKEN: ${{ github.token }}
