name: Chat Answer
on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  answer:
    if: contains(github.event.issue.labels.*.name, 'chat-request')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rate limit check
        uses: actions/github-script@v7
        with:
          script: |
            const oneHourAgo = new Date(Date.now() - 3600000).toISOString();
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'chat-request',
              since: oneHourAgo,
              state: 'all',
              per_page: 100,
            });
            if (issues.length > 20) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: JSON.stringify({ status: 'rate_limited', ts: new Date().toISOString() }),
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: 'closed',
                labels: ['chat-rate-limited'],
              });
              core.setFailed('rate limited');
            }

      - name: Post thinking comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: JSON.stringify({ status: 'thinking', ts: new Date().toISOString() }),
            });

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r scripts/requirements.txt

      - name: Extract question from issue body
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            let body = context.payload.issue.body || '';
            // Body is JSON: {"question":"..."}. Fall back to raw body if not JSON.
            let question;
            try {
              const parsed = JSON.parse(body);
              question = parsed.question || body;
            } catch { question = body; }
            if (!question) {
              core.setFailed('no question');
              return;
            }
            core.setOutput('question', question);

      - name: Run chat_answer
        id: run
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ANSWER=$(python -m scripts.chat_answer --question "${{ steps.parse.outputs.question }}")
          # Use heredoc to safely pass to GITHUB_OUTPUT even with newlines
          {
            echo "answer<<EOF_ANSWER"
            echo "$ANSWER"
            echo "EOF_ANSWER"
          } >> "$GITHUB_OUTPUT"

      - name: Post answer
        uses: actions/github-script@v7
        env:
          ANSWER: ${{ steps.run.outputs.answer }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: JSON.stringify({
                status: 'answer',
                answer: process.env.ANSWER,
                model: 'claude-haiku-4-5',
                ts: new Date().toISOString(),
              }),
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              labels: ['chat-complete'],
            });
