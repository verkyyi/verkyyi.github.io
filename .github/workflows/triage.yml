name: Triage

on:
  issues:
    types: [opened, reopened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to triage'
        required: true
        type: string

permissions:
  contents: read
  issues: write
  actions: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check onboarding complete
        run: |
          if [ ! -f state/evolve_config.md ]; then
            echo "::warning::Onboarding not complete. Run: claude 'Set up agentfolio. Follow https://github.com/verkyyi/agentfolio/blob/main/docs/onboarding.md'"
            exit 0
          fi

      - name: Check for recent human activity
        id: human
        run: |
          RECENT_HUMAN=$(git log origin/main --since="2 hours ago" --format="%an" \
            | grep -v "agentfolio\[bot\]" | head -1)
          if [ -n "$RECENT_HUMAN" ]; then
            echo "HUMAN_ACTIVE=true" >> $GITHUB_OUTPUT
            echo "Human recently active — triage will classify but not auto-queue"
          else
            echo "HUMAN_ACTIVE=false" >> $GITHUB_OUTPUT
          fi

      - name: Resolve issue
        id: issue
        run: |
          NUM="${{ inputs.issue_number || github.event.issue.number }}"
          echo "NUMBER=$NUM" >> $GITHUB_OUTPUT
          gh issue view "$NUM" --json title,body,author > /tmp/issue.json
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Build triage prompt
        run: |
          NUM=${{ steps.issue.outputs.NUMBER }}
          TITLE=$(jq -r '.title' /tmp/issue.json)
          AUTHOR=$(jq -r '.author.login' /tmp/issue.json)
          BODY=$(jq -r '.body' /tmp/issue.json)

          LEARNED_RULES=$(cat state/learned_rules.md)

          cat > /tmp/triage_prompt.txt << PROMPT
          Read the root CLAUDE.md and $(grep '^CLAUDE.md:' state/evolve_config.md | cut -d' ' -f2) for context.

          ## Evolve Config
          $(cat state/evolve_config.md)

          Use the project name from the config for labels (not "project:scaffold").
          When a workflow is marked SKIP in the config, ignore its failures in health checks.
          Read CLAUDE.md from the path in the Project section of the config.

          Adapt triage categories to match the project described in the Evolve Config.
          Use the repo name as the project label (e.g., \`project:<reponame>\`) instead of hardcoding \`project:scaffold\`.

          ## Learned Rules (from human feedback — MUST follow these)
          ${LEARNED_RULES}

          You are the triage agent. Classify this GitHub Issue and take action.

          Issue #${NUM}
          Title: ${TITLE}
          Submitted by: ${AUTHOR}

          Body:
          ${BODY}

          ## Classification rules:
          - BUG: something is broken, not working, displaying wrong, link is broken
          - FEATURE: new functionality, improvement, or enhancement to implement
          - EVOLVE-IDEA: issue created by evolve.yml (title starts with [evolve]) — an actionable improvement inspired by external research
          - PIPELINE-FIX: workflow/CI failure (title starts with [pipeline]) — a bug in the automation pipeline
          - ADOPTER-INSIGHT: pattern from real user behavior (title starts with [adopter-insight]) — improvement based on how people actually use the scaffold
          - GROWTH-ACTION: distribution/marketing task (title starts with [growth]) — requires manual execution on external platforms
          - UX-REQUEST: suggestion to improve something that works but could be better
          - POSITIVE: positive feedback, thank you, compliment
          - SPAM: promotional, unrelated, bot-generated
          - QUESTION: asking for information

          ## Your actions:

          ### Step 1: Classify the issue using the rules above.

          ### Step 2: Elaborate and rewrite the issue body.

          Read the codebase to understand what the issue is about. Then rewrite
          the issue body into a unified format using gh issue edit --body.

          Use this template:

          ## Summary
          One clear sentence explaining what needs to happen.

          ## Context
          Why this matters. What triggered this issue. Link to source if from evolve.
          Reference specific files, functions, or lines of code that are relevant.

          ## Acceptance Criteria
          - [ ] Concrete, testable checklist of what "done" looks like
          - [ ] Each item should be verifiable by the coder agent

          ## Affected Files
          List the files that likely need changes (use Glob/Grep/Read to find them).

          ## Notes
          Any constraints, gotchas, or related issues.

          ---
          *Triaged by agentfolio triage agent*

          IMPORTANT: Preserve the original issue title. Keep the [evolve] or
          [pipeline] prefix if present. The elaborated body should give the
          coder agent everything it needs to implement without guessing.

          ### Step 3: Add labels and comment.

          IMPORTANT — Human activity mode: HUMAN_ACTIVE=${{ steps.human.outputs.HUMAN_ACTIVE }}
          When HUMAN_ACTIVE=true, a human is actively working in a CLI session.
          In this mode, replace "agent-ready" with "triaged" in ALL label commands below.
          The issue is classified and ready, but queued for the human to decide when to
          hand it to the coder. Add a note in the comment: "(Human active — queued for owner)"

          When HUMAN_ACTIVE=false, use the labels exactly as written below (normal mode).

          For BUG:
            gh issue edit ${NUM} --add-label "bug,agent-ready" --repo ${{ github.repository }}
            gh issue comment ${NUM} --body "**Triage:** Classified as a bug. Issue elaborated. The coder agent will investigate and open a fix PR shortly." --repo ${{ github.repository }}

          For FEATURE:
            gh issue edit ${NUM} --add-label "feature,agent-ready" --repo ${{ github.repository }}
            gh issue comment ${NUM} --body "**Triage:** Classified as a feature request. Issue elaborated. The coder agent will implement this shortly." --repo ${{ github.repository }}

          For EVOLVE-IDEA:
            gh issue edit ${NUM} --add-label "agent-ready" --repo ${{ github.repository }}
            gh issue comment ${NUM} --body "**Triage:** Evolve-generated idea triaged and elaborated. The coder agent will implement this shortly." --repo ${{ github.repository }}

          For PIPELINE-FIX:
            First determine if the fix requires human infrastructure action (creating secrets/PATs,
            changing GitHub App permissions, configuring external services, repository settings changes)
            vs. a code fix the agent can make (editing workflow YAML, fixing scripts, updating configs).

            If the agent CAN fix it (code/config changes):
              gh issue edit ${NUM} --add-label "agent-ready" --repo ${{ github.repository }}
              gh issue comment ${NUM} --body "**Triage:** Pipeline failure identified and elaborated. The coder agent will investigate and fix shortly." --repo ${{ github.repository }}

            If it REQUIRES human action (secrets, permissions, external service config):
              gh issue edit ${NUM} --add-label "needs-human,pipeline-fix" --repo ${{ github.repository }}
              gh issue comment ${NUM} --body "**Triage:** Pipeline failure identified. This requires human infrastructure action (secrets, permissions, or external configuration) that the agent cannot perform. Flagged for the owner." --repo ${{ github.repository }}

          For ADOPTER-INSIGHT:
            gh issue edit ${NUM} --add-label "agent-ready" --repo ${{ github.repository }}
            gh issue comment ${NUM} --body "**Triage:** Adopter insight identified — this is based on real user behavior. The coder agent will implement this improvement shortly." --repo ${{ github.repository }}

          For GROWTH-ACTION:
            gh issue edit ${NUM} --add-label "needs-human,growth-action" --repo ${{ github.repository }}
            gh issue comment ${NUM} --body "**Triage:** Growth action identified. This requires action on an external platform — flagged for the owner." --repo ${{ github.repository }}

          For UX-REQUEST:
            gh issue edit ${NUM} --add-label "ux-request,needs-review" --repo ${{ github.repository }}
            gh issue comment ${NUM} --body "**Triage:** Classified as a UX suggestion. Issue elaborated. Queued for the owner's review." --repo ${{ github.repository }}

          For POSITIVE:
            gh issue edit ${NUM} --add-label "positive" --repo ${{ github.repository }}
            gh issue comment ${NUM} --body "**Triage:** Thank you for the positive feedback! This has been logged." --repo ${{ github.repository }}
            gh issue close ${NUM} --repo ${{ github.repository }}

          For SPAM:
            gh issue edit ${NUM} --add-label "spam" --repo ${{ github.repository }}
            gh issue close ${NUM} --repo ${{ github.repository }}

          For QUESTION:
            gh issue edit ${NUM} --add-label "question" --repo ${{ github.repository }}

          ### Step 4: Do not modify any repo files. Issue elaboration and classification only.
          PROMPT

      - name: Run triage
        run: |
          claude -p "$(cat /tmp/triage_prompt.txt)" \
            --model opus \
            --effort max \
            --max-turns 30 \
            --fallback-model sonnet \
            --permission-mode bypassPermissions \
            --output-format json \
            > /tmp/claude_output.json
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Log usage metrics
        if: always()
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          if [ -f /tmp/claude_output.json ]; then
            MODEL=$(jq -r '(.modelUsage // {} | keys | .[0]) // "unknown"' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            INPUT=$(jq -r '((.usage.input_tokens // 0) + (.usage.cache_creation_input_tokens // 0) + (.usage.cache_read_input_tokens // 0)) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            OUTPUT=$(jq -r '(.usage.output_tokens // 0) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            TURNS=$(jq -r '(.num_turns // 0) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            COST=$(jq -r '(.total_cost_usd // 0) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
          else
            MODEL="unknown"; INPUT="unknown"; OUTPUT="unknown"; TURNS="unknown"; COST="unknown"
          fi
          mkdir -p state
          if [ ! -f state/usage_log.md ]; then
            printf '# Usage Log\n' > state/usage_log.md
          fi
          echo "${TIMESTAMP} | triage | model:${MODEL} | in:${INPUT} | out:${OUTPUT} | turns:${TURNS} | cost:${COST}" >> state/usage_log.md
          CUTOFF=$(date -u -d '7 days ago' +%Y-%m-%dT)
          awk -v c="$CUTOFF" 'NR==1{print;next} $0>=c' state/usage_log.md > /tmp/usage_trimmed.md && mv /tmp/usage_trimmed.md state/usage_log.md

      - name: Commit usage log
        if: always()
        run: |
          git config user.name "agentfolio[bot]"
          git config user.email "agentfolio[bot]@users.noreply.github.com"
          git add state/usage_log.md
          if ! git diff --cached --quiet; then
            git commit -m "state: triage usage metrics"
            git pull --rebase || true
            git push || true
          fi

      - name: Trigger coder if agent-ready
        if: steps.human.outputs.HUMAN_ACTIVE == 'false'
        run: |
          NUM=${{ steps.issue.outputs.NUMBER }}
          LABELS=$(gh issue view "$NUM" --json labels -q '.labels[].name')
          if echo "$LABELS" | grep -q "agent-ready"; then
            echo "Triggering coder for issue #$NUM"
            gh workflow run coder.yml -f issue_number="$NUM"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
