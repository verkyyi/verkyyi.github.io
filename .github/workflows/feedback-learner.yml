name: Feedback Learner

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [closed]
  issues:
    types: [closed]

permissions:
  contents: write
  issues: write
  pull-requests: read

concurrency:
  group: feedback-learner
  cancel-in-progress: false

jobs:
  learn:
    # Only learn from human feedback, not bot comments
    if: >
      github.event.sender.login != 'github-actions[bot]' &&
      github.event.sender.type == 'User' &&
      !(github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check onboarding complete
        run: |
          if [ ! -f state/evolve_config.md ]; then
            echo "::warning::Onboarding not complete. Run: claude 'Set up agentfolio. Follow https://github.com/verkyyi/agentfolio/blob/main/docs/onboarding.md'"
            exit 0
          fi

      - name: Collect feedback context
        id: context
        run: |
          EVENT="${{ github.event_name }}"
          echo "EVENT=$EVENT" >> $GITHUB_OUTPUT

          if [ "$EVENT" = "issue_comment" ]; then
            BODY="${{ github.event.comment.body }}"
            SOURCE="issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
            AUTHOR="${{ github.event.comment.user.login }}"
          elif [ "$EVENT" = "pull_request_review" ]; then
            BODY="${{ github.event.review.body }}"
            SOURCE="PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
            AUTHOR="${{ github.event.review.user.login }}"
            STATE="${{ github.event.review.state }}"
            echo "REVIEW_STATE=$STATE" >> $GITHUB_OUTPUT
          elif [ "$EVENT" = "pull_request_review_comment" ]; then
            BODY="${{ github.event.comment.body }}"
            SOURCE="PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
            AUTHOR="${{ github.event.comment.user.login }}"
          elif [ "$EVENT" = "issues" ]; then
            BODY="Issue closed as ${{ github.event.issue.state_reason }}"
            SOURCE="issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
            AUTHOR="${{ github.event.sender.login }}"
            LABELS=$(gh issue view ${{ github.event.issue.number }} --json labels -q '[.labels[].name] | join(",")')
            echo "LABELS=$LABELS" >> $GITHUB_OUTPUT
          elif [ "$EVENT" = "pull_request" ]; then
            PR_NUM="${{ github.event.pull_request.number }}"
            LINKED_ISSUE=$(gh pr view "$PR_NUM" --json body -q '.body' | grep -oP '(?:Fixes|Closes|Resolves)\s+#\K\d+' | head -1 || echo "")
            PR_COMMENTS=$(gh pr view "$PR_NUM" --json comments,reviews --jq '([.comments[] | "[\(.author.login)] \(.body)"] + [.reviews[] | "[\(.author.login)] (\(.state)) \(.body)"]) | .[]' 2>/dev/null | tail -20)
            BODY="PR #${PR_NUM} closed without merge. Rejection context: ${PR_COMMENTS}"
            SOURCE="PR #${PR_NUM}: ${{ github.event.pull_request.title }}"
            AUTHOR="${{ github.event.sender.login }}"
            echo "LINKED_ISSUE=$LINKED_ISSUE" >> $GITHUB_OUTPUT
          fi

          echo "AUTHOR=$AUTHOR" >> $GITHUB_OUTPUT
          echo "SOURCE=$SOURCE" >> $GITHUB_OUTPUT

          # Write body to file to handle multiline/special chars
          echo "$BODY" > /tmp/feedback_body.txt
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Extract lesson
        run: |
          EVENT="${{ steps.context.outputs.EVENT }}"
          SOURCE="${{ steps.context.outputs.SOURCE }}"
          AUTHOR="${{ steps.context.outputs.AUTHOR }}"
          REVIEW_STATE="${{ steps.context.outputs.REVIEW_STATE }}"
          LABELS="${{ steps.context.outputs.LABELS }}"
          FEEDBACK=$(cat /tmp/feedback_body.txt)
          CURRENT_RULES=$(cat state/learned_rules.md)
          TODAY=$(date -u +%Y-%m-%d)

          cat > /tmp/learner_prompt.txt << PROMPT
          You are the feedback learner. Your job is to extract lasting lessons
          from human feedback and add them to the system's learned rules.

          ## Feedback received:

          Event: ${EVENT}
          Source: ${SOURCE}
          Author: ${AUTHOR}
          Review state: ${REVIEW_STATE}
          Labels: ${LABELS}

          Feedback content:
          ${FEEDBACK}

          ## Evolve Config
          $(cat state/evolve_config.md)

          Use the project name from the config for labels (not "project:scaffold").
          When a workflow is marked SKIP in the config, ignore its failures in health checks.
          Read CLAUDE.md from the path in the Project section of the config.

          ## Current learned rules:
          ${CURRENT_RULES}

          ## Your task:

          1. Analyze the feedback. Determine if it contains a LASTING LESSON
             that should change how agents behave in the future.

          2. A lasting lesson is:
             - A correction: "don't do X" or "always do Y"
             - A preference: "I prefer X over Y"
             - A quality standard: "check X before merging"
             - A rejection pattern: issue closed as "not planned" = "don't create issues like this"
             - A PR rejection with specific reasoning

          3. NOT a lasting lesson (skip these):
             - One-time instructions ("fix this typo")
             - Acknowledgments ("thanks", "looks good", "LGTM")
             - Questions without implied preference
             - Bot-generated comments
             - Approvals without additional context

          4. If there IS a lasting lesson:
             - Check if a similar rule already exists in the current rules
             - If yes: update the existing rule (make it more precise or broader)
             - If no: append a new rule

             Format for new rules:
             ## [CATEGORY] Brief rule title
             **Date:** ${TODAY} | **Source:** ${SOURCE}

             [The rule in clear, actionable language. One or two sentences max.]

             Categories: QUALITY, STYLE, ARCHITECTURE, PROCESS, CONTENT, AVOID

          5. If there is NO lasting lesson: do nothing. Do not write to any file.
             Write "NO_LESSON" to .learner-result

          6. If you DO write a lesson: write "LESSON_ADDED" to .learner-result

          ## Actionable request detection:

          ALSO determine if the feedback contains an ACTIONABLE REQUEST —
          something that should be done right now, not just remembered.

          Examples of actionable requests:
          - "fix this" / "change this" / "update this" / "remove this"
          - "can you also add X" / "this should do Y instead"
          - "revert this" / "this broke X"
          - PR review requesting changes with specific instructions

          Examples of NOT actionable (learn only):
          - "in the future, always do X" (rule, not action)
          - "LGTM" / "looks good" (acknowledgment)
          - "why did you do X?" (question)

          If there IS an actionable request:
          - Write the action description to .action-needed
          - Format: ISSUE_OR_PR_NUMBER|ACTION_TYPE|DESCRIPTION
          - ACTION_TYPE is one of: NEW_ISSUE, RETRIGGER_CODER, RETRIGGER_REVIEWER
          - Example: 4|NEW_ISSUE|Fix button color to match cosmic design palette
          - Example: 6|RETRIGGER_CODER|PR review requested changes, needs rework

          A comment can be BOTH a lasting lesson AND an actionable request.

          IMPORTANT: Only append to state/learned_rules.md. Never delete existing rules.
          PROMPT

          claude -p "$(cat /tmp/learner_prompt.txt)" \
            --model opus \
            --effort max \
            --max-turns 25 \
            --permission-mode bypassPermissions \
            --output-format json \
            > /tmp/claude_output.json
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Log usage metrics
        if: always()
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          if [ -f /tmp/claude_output.json ]; then
            MODEL=$(jq -r '(.modelUsage // {} | keys | .[0]) // "unknown"' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            INPUT=$(jq -r '((.usage.input_tokens // 0) + (.usage.cache_creation_input_tokens // 0) + (.usage.cache_read_input_tokens // 0)) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            OUTPUT=$(jq -r '(.usage.output_tokens // 0) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            TURNS=$(jq -r '(.num_turns // 0) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            COST=$(jq -r '(.total_cost_usd // 0) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
          else
            MODEL="unknown"; INPUT="unknown"; OUTPUT="unknown"; TURNS="unknown"; COST="unknown"
          fi
          mkdir -p state
          if [ ! -f state/usage_log.md ]; then
            printf '# Usage Log\n' > state/usage_log.md
          fi
          echo "${TIMESTAMP} | feedback-learner | model:${MODEL} | in:${INPUT} | out:${OUTPUT} | turns:${TURNS} | cost:${COST}" >> state/usage_log.md
          CUTOFF=$(date -u -d '7 days ago' +%Y-%m-%dT)
          awk -v c="$CUTOFF" 'NR==1{print;next} $0>=c' state/usage_log.md > /tmp/usage_trimmed.md && mv /tmp/usage_trimmed.md state/usage_log.md

      - name: Commit if rules changed
        run: |
          if [ -f .learner-result ] && grep -q "LESSON_ADDED" .learner-result; then
            git config user.name "agentfolio[bot]"
            git config user.email "agentfolio[bot]@users.noreply.github.com"
            git add state/learned_rules.md state/usage_log.md
            if ! git diff --cached --quiet; then
              git commit -m "state: learned rule from human feedback"
              git pull --rebase || true
              git push || true
            fi
          else
            git config user.name "agentfolio[bot]"
            git config user.email "agentfolio[bot]@users.noreply.github.com"
            git add state/usage_log.md
            if ! git diff --cached --quiet; then
              git commit -m "state: feedback-learner usage metrics"
              git pull --rebase || true
              git push || true
            fi
          fi
          rm -f .learner-result

      - name: Handle PR rejection
        if: >
          github.event_name == 'pull_request' &&
          steps.context.outputs.LINKED_ISSUE != ''
        run: |
          LINKED_ISSUE="${{ steps.context.outputs.LINKED_ISSUE }}"
          PR_NUM="${{ github.event.pull_request.number }}"

          # Re-add agent-ready label to linked issue
          gh issue edit "$LINKED_ISSUE" --add-label "agent-ready" --repo ${{ github.repository }}

          # Post rejection context on linked issue
          gh issue comment "$LINKED_ISSUE" \
            --body "**Feedback learner:** PR #${PR_NUM} was closed without merge. Re-triggering coder with rejection context.

          ---
          *Re-queued by feedback-learner.yml*" \
            --repo ${{ github.repository }}

          # Write action-needed file for existing Act on feedback step
          echo "${LINKED_ISSUE}|RETRIGGER_CODER|PR #${PR_NUM} closed without merge, needs rework" > .action-needed
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Act on feedback if needed
        run: |
          if [ ! -f .action-needed ]; then
            echo "No action needed"
            exit 0
          fi

          ACTION_LINE=$(cat .action-needed)
          NUM=$(echo "$ACTION_LINE" | cut -d'|' -f1)
          TYPE=$(echo "$ACTION_LINE" | cut -d'|' -f2)
          DESC=$(echo "$ACTION_LINE" | cut -d'|' -f3-)

          echo "Action: $TYPE on #$NUM — $DESC"

          case "$TYPE" in
            NEW_ISSUE)
              ISSUE_URL=$(gh issue create \
                --title "$DESC" \
                --body "Created from human feedback on #${NUM}.\n\n---\n*Created by feedback-learner*" \
                --label "agent-ready,project:$(gh repo view --json name -q .name)" \
                --repo ${{ github.repository }})
              NEW_NUM=$(echo "$ISSUE_URL" | grep -oP '\d+$')
              gh workflow run triage.yml -f issue_number="$NEW_NUM"
              echo "Created issue #$NEW_NUM and triggered triage"
              ;;
            RETRIGGER_CODER)
              gh workflow run coder.yml -f issue_number="$NUM"
              echo "Re-triggered coder for issue #$NUM"
              ;;
            RETRIGGER_REVIEWER)
              gh workflow run reviewer.yml -f pr_number="$NUM"
              echo "Re-triggered reviewer for PR #$NUM"
              ;;
          esac

          rm -f .action-needed
        env:
          GH_TOKEN: ${{ github.token }}
