name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'content/**'
      - 'public/**'
      - 'state/**'
      - 'skills/**'
      - 'astro.config.*'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check onboarding complete
        run: |
          if [ ! -f state/evolve_config.md ]; then
            echo "::warning::Onboarding not complete. Run: claude 'Set up agentfolio. Follow https://github.com/verkyyi/agentfolio/blob/main/docs/onboarding.md'"
            exit 0
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install project dependencies
        run: |
          INSTALL_CMD=$(grep '^install:' state/evolve_config.md | cut -d: -f2- | xargs)
          if [ -n "$INSTALL_CMD" ]; then
            eval "$INSTALL_CMD"
          fi

      - name: Build
        run: |
          BUILD_CMD=$(grep '^build:' state/evolve_config.md | cut -d: -f2- | xargs)
          if [ -n "$BUILD_CMD" ] && [ "$BUILD_CMD" != "(none)" ]; then
            eval "$BUILD_CMD"
          fi
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io
          BASE_PATH: /${{ github.event.repository.name }}

      # Regenerate sitemap if not already in dist
      - name: Verify sitemap
        run: |
          if [ -f "dist/sitemap-index.xml" ]; then
            echo "Sitemap generated by Astro integration"
          else
            echo "Warning: sitemap not found in dist/"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
