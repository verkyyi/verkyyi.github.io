name: Deploy to GitHub Pages

# Disabled: GitHub Pages auto-deploys on push to main.
# This workflow exists for future use if a build step is needed.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check onboarding complete
        run: |
          if [ ! -f state/evolve_config.md ]; then
            echo "::warning::Onboarding not complete. Run: claude 'Set up agentfolio. Follow https://github.com/verkyyi/agentfolio/blob/main/docs/onboarding.md'"
            exit 0
          fi

      - name: Build
        run: |
          BUILD_CMD=$(grep '^build:' state/evolve_config.md | cut -d: -f2- | xargs)
          if [ -n "$BUILD_CMD" ] && [ "$BUILD_CMD" != "(none)" ]; then
            eval "$BUILD_CMD"
          else
            echo "No build command configured — static site, skipping build"
            mkdir -p dist
            cp -r *.html *.css *.js 6150/ Presentation/ dist/ 2>/dev/null || true
          fi
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io
          BASE_PATH: /${{ github.event.repository.name }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
