name: Weekly Analysis

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check onboarding complete
        run: |
          if [ ! -f state/evolve_config.md ]; then
            echo "::warning::Onboarding not complete. Run: claude 'Set up agentfolio. Follow https://github.com/verkyyi/agentfolio/blob/main/docs/onboarding.md'"
            exit 0
          fi

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Build analysis prompt
        run: |
          cat > /tmp/prompt.txt << 'PROMPT'
          You are the weekly analysis agent for Agentfolio.

          ## Your Task
          Produce a strategic analysis of the scaffold's past week.

          ### What to analyze
          1. Read state/agent_log.md entries from the past 7 days
          2. Read state/research_log.md entries from the past 7 days
          3. Review git log from the past 7 days
          4. If FEATURE_STATUS.md exists at the path in the Evolve Config, include it — what progressed?

          ### What to look for
          - Recurring failures or patterns in agent_log
          - Workflow bottlenecks (PRs that took multiple review rounds)
          - Skills used vs. available — any gaps?
          - Research findings that haven't been acted on yet
          - FEATURE_STATUS items that are stalled

          ### Output
          Append a weekly summary to state/agent_log.md with:
          - Format: ISO_TIMESTAMP | analyze | weekly-summary | [key findings]
          - Include: actions completed, failures encountered, recommendations

          Update state/project_state.md with current priorities.

          If clear improvements are identified, write them to
          .proposed-change.md (same format as evolve.yml — one per run max).

          ## Evolve Config
          $(cat state/evolve_config.md)

          Use the project name from the config for labels (not "project:scaffold").
          When a workflow is marked SKIP in the config, ignore its failures in health checks.
          Read CLAUDE.md from the path in the Project section of the config.

          ## Context
          $(cat CLAUDE.md)
          $(cat $(grep '^CLAUDE.md:' state/evolve_config.md | cut -d' ' -f2))

          ## Current State
          $(cat state/project_state.md)
          PROMPT

      - name: Run Claude Code
        run: |
          claude -p "$(cat /tmp/prompt.txt)" \
            --model opus \
            --effort max \
            --max-turns 25 \
            --permission-mode bypassPermissions \
            --output-format json \
            > /tmp/claude_output.json
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Log usage metrics
        if: always()
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          if [ -f /tmp/claude_output.json ]; then
            MODEL=$(jq -r '(.modelUsage // {} | keys | .[0]) // "unknown"' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            INPUT=$(jq -r '((.usage.input_tokens // 0) + (.usage.cache_creation_input_tokens // 0) + (.usage.cache_read_input_tokens // 0)) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            OUTPUT=$(jq -r '(.usage.output_tokens // 0) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            TURNS=$(jq -r '(.num_turns // 0) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            COST=$(jq -r '(.total_cost_usd // 0) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
          else
            MODEL="unknown"; INPUT="unknown"; OUTPUT="unknown"; TURNS="unknown"; COST="unknown"
          fi
          mkdir -p state
          if [ ! -f state/usage_log.md ]; then
            printf '# Usage Log\n' > state/usage_log.md
          fi
          echo "${TIMESTAMP} | analyze | model:${MODEL} | in:${INPUT} | out:${OUTPUT} | turns:${TURNS} | cost:${COST}" >> state/usage_log.md
          CUTOFF=$(date -u -d '7 days ago' +%Y-%m-%dT)
          awk -v c="$CUTOFF" 'NR==1{print;next} $0>=c' state/usage_log.md > /tmp/usage_trimmed.md && mv /tmp/usage_trimmed.md state/usage_log.md

      - name: Setup git config
        run: |
          git config user.name "agentfolio[bot]"
          git config user.email "agentfolio[bot]@users.noreply.github.com"

      - name: Commit state updates
        run: |
          git add state/
          git diff --cached --quiet || git commit -m "state: weekly analysis — $(date -u +%Y-%m-%d)"
          git push || true

      - name: Create improvement PR if proposed
        if: hashFiles('.proposed-change.md') != ''
        run: |
          BRANCH="analyze/$(date +%Y%m%d)-${GITHUB_RUN_ID}"
          git checkout -b "$BRANCH"
          TITLE=$(head -1 .proposed-change.md | sed 's/^# //')
          BODY=$(cat .proposed-change.md)
          rm .proposed-change.md
          git add -A
          git diff --cached --quiet || git commit -m "feat(harness): $TITLE"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "$TITLE" \
            --body "$BODY" \
            --label "needs-review"
        env:
          GH_TOKEN: ${{ github.token }}
