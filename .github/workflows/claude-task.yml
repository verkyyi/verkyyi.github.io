name: Claude Task (Manual)

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'What should Claude do?'
        required: true
        type: string
      open_pr:
        description: 'Open a PR instead of committing directly?'
        required: false
        type: boolean
        default: false
      app_name:
        description: 'Target project (folder name in apps/)'
        required: false
        type: string
        default: 'scaffold'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check onboarding complete
        run: |
          if [ ! -f state/evolve_config.md ]; then
            echo "::warning::Onboarding not complete. Run: claude 'Set up agentfolio. Follow https://github.com/verkyyi/agentfolio/blob/main/docs/onboarding.md'"
            exit 0
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install project dependencies
        run: |
          INSTALL_CMD=$(grep '^install:' state/evolve_config.md | cut -d: -f2- | xargs)
          if [ -n "$INSTALL_CMD" ]; then
            eval "$INSTALL_CMD"
          fi

      - name: Create branch if PR requested
        if: inputs.open_pr == true
        id: branch
        run: |
          BRANCH="task/manual-$(date -u +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_OUTPUT

      - name: Build task prompt
        run: |
          cat > /tmp/task_prompt.txt << PROMPT
          $(cat CLAUDE.md)
          ---
          $(cat $(grep '^CLAUDE.md:' state/evolve_config.md | cut -d' ' -f2))
          ---

          ## Current State
          $(cat state/project_state.md)

          ## Evolve Config
          $(cat state/evolve_config.md)

          Use the Build section for install/build/test commands. Do NOT assume npm.
          Read CLAUDE.md from the path in the Project section of the config.

          ---

          ## Task from Developer
          ${{ inputs.prompt }}

          ## Instructions
          Complete the task above. You have full access to:
          - Read and write all project files
          - Run bash commands (npm, git status, etc.)
          - Create GitHub Issues if needed

          After completing:
          1. Update state/project_state.md with what you did
          2. Append to state/agent_log.md:
             TIMESTAMP | claude-task.yml | manual task | [outcome]
          3. Write .commit-message with a descriptive message
          4. If the task involved FEATURE_STATUS items, update them

          Do NOT use git commit or git push — the workflow handles that.
          PROMPT

      - name: Run Claude agent
        run: |
          claude -p "$(cat /tmp/task_prompt.txt)" \
            --model opus \
            --effort max \
            --max-turns 50 \
            --fallback-model sonnet \
            --permission-mode bypassPermissions \
            --output-format json \
            > /tmp/claude_output.json
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log usage metrics
        if: always()
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          if [ -f /tmp/claude_output.json ]; then
            MODEL=$(jq -r '(.modelUsage // {} | keys | .[0]) // "unknown"' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            INPUT=$(jq -r '((.usage.input_tokens // 0) + (.usage.cache_creation_input_tokens // 0) + (.usage.cache_read_input_tokens // 0)) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            OUTPUT=$(jq -r '(.usage.output_tokens // 0) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            TURNS=$(jq -r '(.num_turns // 0) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            COST=$(jq -r '(.total_cost_usd // 0) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
          else
            MODEL="unknown"; INPUT="unknown"; OUTPUT="unknown"; TURNS="unknown"; COST="unknown"
          fi
          mkdir -p state
          if [ ! -f state/usage_log.md ]; then
            printf '# Usage Log\n' > state/usage_log.md
          fi
          echo "${TIMESTAMP} | claude-task | model:${MODEL} | in:${INPUT} | out:${OUTPUT} | turns:${TURNS} | cost:${COST}" >> state/usage_log.md
          CUTOFF=$(date -u -d '7 days ago' +%Y-%m-%dT)
          awk -v c="$CUTOFF" 'NR==1{print;next} $0>=c' state/usage_log.md > /tmp/usage_trimmed.md && mv /tmp/usage_trimmed.md state/usage_log.md

      - name: Commit directly to main
        if: inputs.open_pr == false
        run: |
          git config user.name "agentfolio[bot]"
          git config user.email "agentfolio[bot]@users.noreply.github.com"
          git add .
          rm -f .commit-message

          if git diff --staged --quiet; then
            echo "No changes from task"
          else
            COMMIT_MSG=$(cat .commit-message 2>/dev/null || \
              echo "feat: manual task via claude-task.yml")
            git commit -m "$COMMIT_MSG"
            git push
          fi

      - name: Open PR
        if: inputs.open_pr == true
        run: |
          git config user.name "agentfolio[bot]"
          git config user.email "agentfolio[bot]@users.noreply.github.com"
          git add .
          rm -f .commit-message

          if git diff --staged --quiet; then
            echo "No changes from task"
            exit 0
          fi

          COMMIT_MSG=$(cat .commit-message 2>/dev/null || \
            echo "feat: manual task")
          git commit -m "$COMMIT_MSG"
          git push origin ${{ steps.branch.outputs.BRANCH }}

          gh pr create \
            --title "$COMMIT_MSG" \
            --body "Manual task via claude-task.yml

          **Prompt:** ${{ inputs.prompt }}

          *Review before merging.*" \
            --head "${{ steps.branch.outputs.BRANCH }}" \
            --base main \
            --label "needs-review" \
            --repo ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
