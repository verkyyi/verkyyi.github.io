name: Discover Project

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Folder name in apps/ to discover (or "all" to scan for new projects)'
        required: false
        default: 'all'

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check onboarding complete
        run: |
          if [ ! -f state/evolve_config.md ]; then
            echo "::warning::Onboarding not complete. Run: claude 'Set up agentfolio. Follow https://github.com/verkyyi/agentfolio/blob/main/docs/onboarding.md'"
            exit 0
          fi

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Build discovery prompt
        run: |
          cat > /tmp/prompt.txt << 'PROMPT'
          You are the project discovery agent for Agentfolio.

          ## Your Task
          Scan the apps/ directory for projects that need setup.

          If app_name is "all": find every folder in apps/ that does NOT
          have a CLAUDE.md file and discover each one.

          If app_name is specific: discover that one project.

          ## Discovery Process
          For each project folder:
          1. SCAN — list all files, check for package.json, Dockerfile,
             config files, source code extensions, directory structure
          2. INFER — determine: language, framework, build tool, test runner,
             deploy mechanism
          3. GENERATE — create two files:
             - apps/<name>/CLAUDE.md with:
               - Project description (inferred from README, package.json, or code)
               - Stack details
               - Build/test/deploy commands (from config files)
               - Autonomy overrides (conservative: everything starts needs-review)
               - Empty failure log
             - apps/<name>/FEATURE_STATUS.md with:
               - Feature inventory based on what you found

          ## Rules
          - Do NOT modify the project's own code
          - Do NOT create per-project workflows
          - Do NOT assume any specific framework — infer everything
          - If apps/<name>/CLAUDE.md already exists, skip that project
          - Write files directly, do not open a PR (the workflow handles git)

          ## Context
          $(cat CLAUDE.md)

          ## Target
          App name: ${{ github.event.inputs.app_name }}
          PROMPT

      - name: Run Claude Code
        run: |
          claude -p "$(cat /tmp/prompt.txt)" \
            --model opus \
            --effort max \
            --max-turns 25 \
            --permission-mode bypassPermissions \
            --output-format json \
            > /tmp/claude_output.json
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Log usage metrics
        if: always()
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          if [ -f /tmp/claude_output.json ]; then
            MODEL=$(jq -r '(.modelUsage // {} | keys | .[0]) // "unknown"' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            INPUT=$(jq -r '((.usage.input_tokens // 0) + (.usage.cache_creation_input_tokens // 0) + (.usage.cache_read_input_tokens // 0)) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            OUTPUT=$(jq -r '(.usage.output_tokens // 0) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            TURNS=$(jq -r '(.num_turns // 0) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            COST=$(jq -r '(.total_cost_usd // 0) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
          else
            MODEL="unknown"; INPUT="unknown"; OUTPUT="unknown"; TURNS="unknown"; COST="unknown"
          fi
          mkdir -p state
          if [ ! -f state/usage_log.md ]; then
            printf '# Usage Log\n' > state/usage_log.md
          fi
          echo "${TIMESTAMP} | discover | model:${MODEL} | in:${INPUT} | out:${OUTPUT} | turns:${TURNS} | cost:${COST}" >> state/usage_log.md
          CUTOFF=$(date -u -d '7 days ago' +%Y-%m-%dT)
          awk -v c="$CUTOFF" 'NR==1{print;next} $0>=c' state/usage_log.md > /tmp/usage_trimmed.md && mv /tmp/usage_trimmed.md state/usage_log.md

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup git config
        run: |
          git config user.name "agentfolio[bot]"
          git config user.email "agentfolio[bot]@users.noreply.github.com"

      - name: Update state (on main, before any branch checkout)
        run: |
          CHANGED=$(git status --porcelain | wc -l)
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) | discover | scanned apps/ for new projects | ${CHANGED} files changed" >> state/agent_log.md
          git add state/
          git commit -m "state: discovery scan completed" || true
          git push || true

      - name: Create PR with discovered projects
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          BRANCH="discover/$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add apps/
          git commit -m "feat: discover new projects in apps/"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "Discover: new project configurations" \
            --body "Auto-generated project constitutions from discover.yml. Review the generated CLAUDE.md files before merging." \
            --label "needs-review"
        env:
          GH_TOKEN: ${{ github.token }}
