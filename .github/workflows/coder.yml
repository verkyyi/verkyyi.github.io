name: Coder Agent

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to work on'
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write

concurrency:
  group: coder-${{ inputs.issue_number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  code:
    # For label events, only fire on 'agent-ready'. For dispatch, always run.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'agent-ready'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.WORKFLOW_PAT || github.token }}

      - name: Check onboarding complete
        run: |
          if [ ! -f state/evolve_config.md ]; then
            echo "::warning::Onboarding not complete. Run: claude 'Set up agentfolio. Follow https://github.com/verkyyi/agentfolio/blob/main/docs/onboarding.md'"
            exit 0
          fi

      - name: Resolve issue
        id: issue
        run: |
          if [ -n "${{ inputs.issue_number }}" ]; then
            NUM="${{ inputs.issue_number }}"
          else
            NUM="${{ github.event.issue.number }}"
          fi
          echo "NUMBER=$NUM" >> $GITHUB_OUTPUT
          gh issue view "$NUM" --json title,body,author > /tmp/issue.json
          echo "TITLE=$(jq -r '.title' /tmp/issue.json)" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check for human-wip or active human session
        id: human
        run: |
          NUM=${{ steps.issue.outputs.NUMBER }}
          LABELS=$(gh issue view "$NUM" --json labels -q '.labels[].name')
          if echo "$LABELS" | grep -q "human-wip"; then
            echo "SKIP=true" >> $GITHUB_OUTPUT
            echo "Issue #$NUM has human-wip label — skipping"
            exit 0
          fi
          # For label-triggered runs (not explicit dispatch), check human activity
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            RECENT_HUMAN=$(git log origin/main --since="2 hours ago" --format="%an" \
              | grep -v "agentfolio\[bot\]" | head -1)
            if [ -n "$RECENT_HUMAN" ]; then
              echo "SKIP=true" >> $GITHUB_OUTPUT
              echo "Human recently active — skipping auto-triggered coder run"
              exit 0
            fi
          fi
          echo "SKIP=false" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Setup Node
        if: steps.human.outputs.SKIP != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code CLI
        if: steps.human.outputs.SKIP != 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Install project dependencies
        if: steps.human.outputs.SKIP != 'true'
        run: |
          INSTALL_CMD=$(grep '^install:' state/evolve_config.md | cut -d: -f2- | xargs)
          if [ -n "$INSTALL_CMD" ]; then
            eval "$INSTALL_CMD"
          fi

      - name: Create feature branch
        if: steps.human.outputs.SKIP != 'true'
        id: branch
        run: |
          ISSUE_NUM=${{ steps.issue.outputs.NUMBER }}
          BRANCH="fix/issue-${ISSUE_NUM}"
          git checkout -b "$BRANCH" 2>/dev/null || git checkout "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_OUTPUT

      - name: Build coder prompt
        if: steps.human.outputs.SKIP != 'true'
        run: |
          ISSUE_NUM=${{ steps.issue.outputs.NUMBER }}
          ISSUE_TITLE=$(jq -r '.title' /tmp/issue.json)
          ISSUE_BODY=$(jq -r '.body' /tmp/issue.json)

          # Fetch issue comments for context (helps when coder is re-triggered after rejection)
          ISSUE_COMMENTS=$(gh issue view "$ISSUE_NUM" --json comments -q '.comments[] | "[\(.author.login)] \(.body)"' | tail -20)

          cat > /tmp/coder_prompt.txt << PROMPT
          $(cat CLAUDE.md)

          ---

          $(cat $(grep '^CLAUDE.md:' state/evolve_config.md | cut -d' ' -f2))

          ---

          ## Current Project State
          $(cat state/project_state.md)

          ## Evolve Config
          $(cat state/evolve_config.md)

          Use the Build section for install/build/test commands. Do NOT assume npm.
          Read CLAUDE.md from the path in the Project section of the config.

          ## Learned Rules (from human feedback — MUST follow these)
          $(cat state/learned_rules.md)

          ---

          ## Your Task
          Fix the issue described below. You are the coder agent.

          Issue #${ISSUE_NUM}: ${ISSUE_TITLE}

          Full issue body:
          ${ISSUE_BODY}

          ## Issue comments
          ${ISSUE_COMMENTS}

          ## Instructions:
          1. Understand the issue from the body above
          2. Find the relevant code in src/ or content/
          3. Implement the fix
          4. Run the test command from the Evolve Config Build section (must succeed before proceeding)
          5. If a FEATURE_STATUS.md file exists at the repo root, update it:
             - Mark any relevant items as [x] if now fixed
          6. Update state/project_state.md:
             - Record what you did
             - Note: opened PR for issue #${ISSUE_NUM}
          7. Update state/agent_log.md:
             - Append: TIMESTAMP | coder.yml | fix issue #${ISSUE_NUM} | [outcome]
          8. Write .commit-message:
             fix: [brief description of fix] (closes #${ISSUE_NUM})

          ## Constraints:
          - Only modify files relevant to the fix
          - You CAN modify any file including workflows and CLAUDE.md if the issue requires it
          - NEVER commit secrets, tokens, or API keys
          - NEVER create changes that could cause infinite workflow loops
          - Build must pass after your changes
          - If you cannot fix it in 3 attempts, write to .fix-failed with reason

          PROMPT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run Claude coder agent
        if: steps.human.outputs.SKIP != 'true'
        run: |
          claude -p "$(cat /tmp/coder_prompt.txt)" \
            --model opus \
            --effort max \
            --max-turns 40 \
            --fallback-model sonnet \
            --permission-mode bypassPermissions \
            --output-format json \
            > /tmp/claude_output.json
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Log usage metrics
        if: always()
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          if [ -f /tmp/claude_output.json ]; then
            MODEL=$(jq -r '(.modelUsage // {} | keys | .[0]) // "unknown"' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            INPUT=$(jq -r '((.usage.input_tokens // 0) + (.usage.cache_creation_input_tokens // 0) + (.usage.cache_read_input_tokens // 0)) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            OUTPUT=$(jq -r '(.usage.output_tokens // 0) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            TURNS=$(jq -r '(.num_turns // 0) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            COST=$(jq -r '(.total_cost_usd // 0) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
          else
            MODEL="unknown"; INPUT="unknown"; OUTPUT="unknown"; TURNS="unknown"; COST="unknown"
          fi
          mkdir -p state
          if [ ! -f state/usage_log.md ]; then
            printf '# Usage Log\n' > state/usage_log.md
          fi
          echo "${TIMESTAMP} | coder | model:${MODEL} | in:${INPUT} | out:${OUTPUT} | turns:${TURNS} | cost:${COST}" >> state/usage_log.md
          CUTOFF=$(date -u -d '7 days ago' +%Y-%m-%dT)
          awk -v c="$CUTOFF" 'NR==1{print;next} $0>=c' state/usage_log.md > /tmp/usage_trimmed.md && mv /tmp/usage_trimmed.md state/usage_log.md

      - name: Check if fix was attempted or failed
        if: steps.human.outputs.SKIP != 'true'
        id: check
        run: |
          if [ -f ".fix-failed" ]; then
            echo "FAILED=true" >> $GITHUB_OUTPUT
            echo "REASON=$(cat .fix-failed)" >> $GITHUB_OUTPUT
          else
            echo "FAILED=false" >> $GITHUB_OUTPUT
          fi

      - name: Handle fix failure
        if: steps.human.outputs.SKIP != 'true' && steps.check.outputs.FAILED == 'true'
        run: |
          NUM=${{ steps.issue.outputs.NUMBER }}
          REASON="${{ steps.check.outputs.REASON }}"

          # Detect infrastructure/permission failures that require human action
          if echo "$REASON" | grep -qiE 'permission|token|secret|credential|PAT|workflow.*permission|auth|forbidden|403'; then
            LABEL="needs-human"
            COMMENT="**Coder agent:** This issue requires human infrastructure action (permissions, secrets, or tokens).

          Reason: ${REASON}

          A human must resolve the infrastructure prerequisite before the agent can proceed."
          else
            LABEL="needs-review"
            COMMENT="**Coder agent:** Could not automatically fix this issue.

          Reason: ${REASON}

          This issue has been escalated for manual review."
          fi

          gh issue comment "$NUM" \
            --body "$COMMENT" \
            --repo ${{ github.repository }}

          gh issue edit "$NUM" \
            --remove-label "agent-ready" \
            --add-label "$LABEL" \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Commit fix
        if: steps.human.outputs.SKIP != 'true' && steps.check.outputs.FAILED == 'false'
        run: |
          git config user.name "agentfolio[bot]"
          git config user.email "agentfolio[bot]@users.noreply.github.com"
          git add .
          rm -f .commit-message .fix-failed

          if git diff --staged --quiet; then
            echo "No changes staged — nothing to commit"
            exit 0
          fi

          COMMIT_MSG=$(cat .commit-message 2>/dev/null || \
            echo "fix: address issue #${{ steps.issue.outputs.NUMBER }}")
          git commit -m "$COMMIT_MSG"
          git push origin ${{ steps.branch.outputs.BRANCH }}

      - name: Open pull request
        if: steps.human.outputs.SKIP != 'true' && steps.check.outputs.FAILED == 'false'
        id: pr
        run: |
          ISSUE_NUM=${{ steps.issue.outputs.NUMBER }}
          ISSUE_TITLE="${{ steps.issue.outputs.TITLE }}"
          BRANCH="${{ steps.branch.outputs.BRANCH }}"

          CHANGED=$(git diff --name-only origin/main...HEAD)
          echo "Changed files: $CHANGED"

          PR_URL=$(gh pr create \
            --title "fix: ${ISSUE_TITLE} (closes #${ISSUE_NUM})" \
            --body "Fixes #${ISSUE_NUM}

          **Changed files:**
          \`\`\`
          ${CHANGED}
          \`\`\`

          *Opened by agentfolio coder agent*" \
            --head "$BRANCH" \
            --base main \
            --repo ${{ github.repository }})

          PR_NUMBER=$(echo "$PR_URL" | grep -oP '(?<=/pull/)\d+')
          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_OUTPUT

          gh issue comment "$ISSUE_NUM" \
            --body "**Coder agent:** Fix implemented. See PR #${PR_NUMBER}." \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Trigger reviewer
        if: steps.human.outputs.SKIP != 'true' && steps.check.outputs.FAILED == 'false' && steps.pr.outputs.PR_NUMBER != ''
        run: |
          echo "Triggering reviewer for PR #${{ steps.pr.outputs.PR_NUMBER }}"
          gh workflow run reviewer.yml -f pr_number="${{ steps.pr.outputs.PR_NUMBER }}"
        env:
          GH_TOKEN: ${{ github.token }}
